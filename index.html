<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腸腸來 | 熟成咖哩專賣</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #F9F6F0; /* 奶油底色 */
            --main-brown: #7D5A44; /* 文青深棕 */
            --soft-orange: #E8A87C; /* 柔和橘 */
            --white: #FFFFFF;
            --shadow: 0 10px 20px rgba(125, 90, 68, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-cream);
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--main-brown);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 手機端寬度限制 */
        .mobile-wrapper {
            width: 100%;
            max-width: 480px; /* 模擬手機寬度 */
            background-color: var(--white);
            min-height: 100vh;
            box-shadow: var(--shadow);
            padding-bottom: 50px;
        }

        /* 頂部形象圖 */
        .hero {
            width: 100%;
            height: 250px;
            background: url('https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=1000') center/cover;
            position: relative;
            border-radius: 0 0 40px 40px;
        }

        .hero-overlay {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            padding: 15px 40px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            white-space: nowrap;
        }

        .hero-overlay h1 {
            margin: 0;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        /* 內容區塊 */
        .content {
            margin-top: 50px;
            padding: 0 25px;
        }

        .section-title {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--soft-orange);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title::before, .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #EEE;
            margin: 0 15px;
        }

        /* 卡片設計 */
        .card {
            background: var(--bg-cream);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #F0EAE0;
        }

        .menu-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .menu-info h3 { margin: 0; font-size: 1rem; }
        .menu-info p { margin: 5px 0 0; font-size: 0.8rem; color: #999; }
        .price { font-weight: bold; color: var(--main-brown); }

        /* 計算器 */
        .calc-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #E0D8D0;
            background: #FFF;
        }

        .btn-calc {
            width: 100%;
            padding: 15px;
            background: var(--main-brown);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 10px;
            cursor: pointer;
        }

        /* 底部社交標誌 */
        .social-links {
            text-align: center;
            margin-top: 30px;
        }

        .ig-tag {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .dog-badge {
            text-align: center;
            font-size: 0.8rem;
            color: #AAA;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="mobile-wrapper">
    <div class="hero">
        <div class="hero-overlay">
            <h1>腸腸來 🍛</h1>
        </div>
    </div>

    <div class="content">
        <p style="text-align: center; font-size: 0.9rem; color: #666;">「用溫暖的熟成咖哩，療癒你的每一天」</p>

        <div class="section-title">今日推薦</div>
        <div class="card">
            <div class="menu-row">
                <div class="menu-info">
                    <h3>厚切豬排咖哩</h3>
                    <p>外酥內嫩的黃金比例</p>
                </div>
                <div class="price">$220</div>
            </div>
            <div class="menu-row">
                <div class="menu-info">
                    <h3>海老炸蝦咖哩</h3>
                    <p>三隻大蝦，份量十足</p>
                </div>
                <div class="price">$180</div>
            </div>
            <div class="menu-row">
                <div class="menu-info">
                    <h3>西西里檸檬咖啡</h3>
                    <p>清新果香，解膩首選</p>
                </div>
                <div class="price">$120</div>
            </div>
        </div>

        <div class="section-title">訂餐預算助手</div>
        <div class="card" style="background: #FFF;">
            <label style="font-size: 0.8rem;">預計訂購數量</label>
            <input type="number" id="m-qty" class="calc-input" placeholder="請輸入份數" value="1">
            <label style="font-size: 0.8rem;">每份金額 ($)</label>
            <input type="number" id="m-price" class="calc-input" value="180">
            <button class="btn-calc" onclick="mCalc()">計算總預算</button>
            <div id="m-res" style="text-align: center; margin-top: 15px; font-weight: bold; color: var(--soft-orange);"></div>
        </div>

        <div class="section-title">店鋪資訊</div>
        <div style="font-size: 0.85rem; line-height: 2;">
            🏠 南投縣埔里鎮北平街35號之25<br>
            📅 週二至週日 11:30 - 20:00<br>
            🐾 寵物友善空間 (歡迎黑柴夥伴)
        </div>

        <div class="social-links">
            <a href="#" class="ig-tag">Follow us on Instagram</a>
        </div>

        <div class="dog-badge">
            店長黑柴 13kg 🐶 認證推薦
        </div>
    </div>
</div>

<script>
    function mCalc() {
        const q = document.getElementById('m-qty').value;
        const p = document.getElementById('m-price').value;
        const total = q * p;
        document.getElementById('m-res').innerText = `預估總額：$${total}`;
    }
</script>

</body>
</html>
